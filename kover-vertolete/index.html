<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kover Vertolet</title>
    <link rel="icon" type="image/svg+xml" href="/kover-vertolete/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700;1,800&family=Metamorphous&family=Share+Tech+Mono&family=UnifrakturMaguntia&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Style éditorial proche campagnes luxe (Didot / Bodoni, famille YSL) */
        --font-ui: "Libre Bodoni", "Bodoni MT", "Didot", "Times New Roman", serif;
        --font-ui-bold: 700;
        --font-ui-heavy: 800;
      }
      * {
        box-sizing: border-box;
        margin: 0;
      }
      html,
      body {
        overflow: hidden;
        width: 100%;
        height: 100%;
        background: #0a0612;
        font-family: var(--font-ui);
      }
      #ui-root {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
      #ui-root button,
      #ui-root select,
      #ui-root input {
        pointer-events: auto;
      }
      #game-host {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: none;
      }
    </style>
    <script type="module" crossorigin src="/kover-vertolete/assets/main-i9QPP0Tx.js"></script>
    <link rel="modulepreload" crossorigin href="/kover-vertolete/assets/html2canvas.esm-DZbuWhpW.js">
    <link rel="modulepreload" crossorigin href="/kover-vertolete/assets/titleClipCore-froKsCI3.js">
    <link rel="stylesheet" crossorigin href="/kover-vertolete/assets/titleClipCore-B3ISrsNK.css">
    <link rel="stylesheet" crossorigin href="/kover-vertolete/assets/main-Dulof-jc.css">
  </head>
  <body>
    <!-- Grain métal (hub) — utilisé par filter: url(#fr-hub-metal-grain) dans hub.css -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="0"
      height="0"
      aria-hidden="true"
      focusable="false"
      style="position: absolute; overflow: hidden"
    >
      <defs>
        <filter
          id="fr-hub-metal-grain"
          x="-8%"
          y="-8%"
          width="116%"
          height="116%"
          color-interpolation-filters="sRGB"
        >
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.72"
            numOctaves="4"
            seed="11"
            stitchTiles="stitch"
            result="n"
          />
          <feColorMatrix in="n" type="saturate" values="0" result="grain" />
          <feBlend in="SourceGraphic" in2="grain" mode="overlay" />
        </filter>
      </defs>
    </svg>
    <div id="game-host"></div>
    <div id="ui-root"></div>
  </body>
</html>
